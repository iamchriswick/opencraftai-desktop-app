name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: '--runner cargo-xwin --target x86_64-pc-windows-msvc'
            label: windows
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            label: macos
          - platform: ubuntu-22.04
            args: ''
            label: linux

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.label == 'macos' && 'aarch64-apple-darwin' || matrix.label == 'windows' && 'x86_64-pc-windows-msvc' || '' }}

      - name: Install Linux native dependencies
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Windows cross-compile dependencies
        if: matrix.label == 'windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y nsis lld llvm

      - name: Install cargo-xwin
        if: matrix.label == 'windows'
        run: cargo install --locked cargo-xwin

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: OpenCraft AI v__VERSION__
          releaseBody: ''
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
